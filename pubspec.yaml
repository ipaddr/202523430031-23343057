name: Auklus
description: "Auklus - AI Contract Risk Analyzer"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  cloud_firestore: ^6.4.1
  file_picker: ^11.0.2
  firebase_auth: ^6.5.1
  firebase_core: ^4.9.0
  flutter:
    sdk: flutter
  provider: ^6.1.2
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  google_fonts: ^6.2.1
  google_mlkit_text_recognition: ^0.15.1
  http: ^1.6.0
  image_picker: ^1.2.2
  syncfusion_flutter_pdf: ^33.2.5
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - .env

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/appicon.png"

flutter_native_splash:
  color: "#0F2540"
  image: "assets/icon/splashscreen.png"
  fullscreen: true
  android_12:
    color: "#0F2540"
    image: "assets/icon/splashscreen.png"
